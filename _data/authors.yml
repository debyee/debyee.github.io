# The primary author of this blog.
# Must be the same as `author` in `_config.yml`.
# Change `author1` to your shortname.
author1:
  name: Debbie Yee
  email: <debbie_yee@brown.edu>

  # Used at the bottom of each page and at the top of the `about` layout
  # Markdown enabled, can use multiple paragraphs (enabled by `|`)
  about: |

    I am a K99 Postdoctoral Researcher in the Department of <a href="https://copsy.brown.edu/" target="blank">
    Cognitive and Psychological Sciences]</a> and the <a href="https://carney.brown.edu/" target="blank">
    Carney Institute for Brain Science</a> at Brown University. I will be starting an Assistant Professor 
    in the Department of <a href="https://psychology.uiowa.edu/" target="blank">Psychological and Brain Sciences</a> 
    this fall (Aug 2026). I serve as the Director of the <a href="https://yeelabneuro.github.io" target="blank"> 
    Computatioal Affective Motivational Psychiatry Lab</a>.
    
    I study mechanisms of motivation, affect, and decision-making across the developmental lifespan, and leverage
    neurocomputational frameworks and digital mental health to understand how neural and physiological processes 
    are dysregulated in mental and neurological illness. How do neuromodulatory systems like serotonin and dopamine
    shape affective and motivational processes to guide adaptive decision-making? How do therapeutic interventions like
    pharmacological agents and transcranial neuromodulation improve mental health outcomes and promote healthy aging? 
    These are some of the key questions that drive my research program.

    As a computational cognitive affective neuroscientist, I seek to bridge basic and clinical science research, 
    whether it be organizing interdisciplinary workshops on <a href="https://sites.brown.edu/gran/">aging neuroscience</a>,
    developing novel publication forums for <a href="https://2026.ccneuro.org/call-for-papers/">CCN</a>, or serving as an 
    advisory board member for the <a href="https://srndna.utdallas.edu/">Scientific Research Network on Decision Neuroscience 
    and Aging</a>. Broadly, I aspire to facilitate research and training opportunities that promote inclusive excellence.



